name: Postman API Tests

on:
  push:
    branches:
      - main

jobs:
  run-postman-tests:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Newman
        run: npm install -g newman

      - name: Run Postman Collection
        run: |
          newman run "collections/Postman Learning.postman_collection.json" -e "environments/Development.postman_environment.json"